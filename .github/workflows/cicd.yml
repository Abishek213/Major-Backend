name: Deploy Backend Application

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t himanshhhh/eventa-backend:latest .

      - name: Push Image to Docker Hub
        run: docker push himanshhhh/eventa-backend:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull Image from Docker Hub
        run: docker pull himanshhhh/eventa-backend:latest

      - name: Delete Old Container
        run: docker rm -f eventa-backend-container || true

      - name: Run Docker Container
        run: |
          docker run -d \
            -p 4000:4000 \
            --name eventa-backend-container \
            --restart unless-stopped \
            -e PORT='${{ secrets.PORT }}' \
            -e MongoDB_URI='${{ secrets.MONGO_URI }}' \
            -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            -e JWT_EXPIRES_IN='${{ secrets.JWT_EXPIRES_IN }}' \
            -e NODE_ENV='production' \
            -e ALLOWED_ORIGINS='${{ secrets.ALLOWED_ORIGINS }}' \
            -e EMAIL_USER='${{ secrets.EMAIL_USER }}' \
            -e EMAIL_PASS='${{ secrets.EMAIL_PASS }}' \
            -e TWILIO_ACCOUNT_SID='${{ secrets.TWILIO_ACCOUNT_SID }}' \
            -e TWILIO_AUTH_TOKEN='${{ secrets.TWILIO_AUTH_TOKEN }}' \
            -e TWILIO_PHONE_NUMBER='${{ secrets.TWILIO_PHONE_NUMBER }}' \
            -e KHALTI_PUBLIC_KEY='${{ secrets.KHALTI_PUBLIC_KEY }}' \
            -e KHALTI_SECRET_KEY='${{ secrets.KHALTI_SECRET_KEY }}' \
            -e KHALTI_BASE_URL='${{ secrets.KHALTI_BASE_URL }}' \
            -e ESEWA_MERCHANT_CODE='${{ secrets.ESEWA_MERCHANT_CODE }}' \
            -e ESEWA_PAYMENT_URL='${{ secrets.ESEWA_PAYMENT_URL }}' \
            -e ESEWA_SECRET_KEY='${{ secrets.ESEWA_SECRET_KEY }}' \
            -e SUCCESS_URL='${{ secrets.SUCCESS_URL }}' \
            -e FAILURE_URL='${{ secrets.FAILURE_URL }}' \
            -e WEBSITE_URL='${{ secrets.WEBSITE_URL }}' \
            -e AI_SERVICE_URL='${{ secrets.AI_SERVICE_URL }}' \
            -e AI_AGENT_URL='${{ secrets.AI_AGENT_URL }}' \
            -e AI_ENABLED='true' \
            -e GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}' \
            -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
            himanshhhh/eventa-backend:latest